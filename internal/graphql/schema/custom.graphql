extend type Query {
  getAuthenticatedUser(userUUID: UUID!): AuthenticatedUser
  getBazelInvocation(invocationID: UUID!): BazelInvocation
  getBuild(buildUUID: UUID!): Build
  getTarget(
    instanceName: String!
    label: String!
    aspect: String!
    targetKind: String!
  ): Target
}

type Profile {
  id: ID!
  name: String!
  digest: String!
  sizeInBytes: Int!
  digestFunction: String!
}

extend type BazelInvocation {
  profile: Profile
}

extend type ConnectionMetadata {
  timeSinceLastConnectionMillis: Int! @goField(forceResolver: true)
}

extend type Target {
  invocationTargetsTotalDurationMillis: Int! @goField(forceResolver: true)
}

"""
Maps a BEP file URI to a server-side download URL when one is available
(bytestream:// URIs route through bb-portal's /api/v1/servefile/...
endpoint; http(s):// URIs pass through; everything else returns null).
"""
type ArtifactFile {
  name: String!
  uri: String
  digest: String
  sizeBytes: Int
  digestFunction: String
  downloadUrl: String @goField(forceResolver: true)
}

"""
Compressed BEP-graph blob written once at BuildFinished when the
invocation's save level is basic_and_target_and_artifacts. payload is
a base64-encoded zstd stream of length-prefixed serialized
bes.BuildEvent messages (NamedSetOfFiles and TargetCompleted variants
only). Clients base64-decode, zstd-decompress, and walk the graph
themselves.
"""
type ArtifactGraph {
  payload: String!
  uncompressedSize: Int!
}

extend type BazelInvocation {
  artifactGraph: ArtifactGraph @goField(forceResolver: true)
}
