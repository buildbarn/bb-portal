extend type Query {
  getAuthenticatedUser(userUUID: UUID!): AuthenticatedUser
  getBazelInvocation(invocationID: UUID!): BazelInvocation
  getBuild(buildUUID: UUID!): Build
  getTarget(
    instanceName: String!
    label: String!
    aspect: String!
    targetKind: String!
  ): Target
}

type Profile {
  id: ID!
  name: String!
  digest: String!
  sizeInBytes: Int!
  digestFunction: String!
}

extend type BazelInvocation {
  profile: Profile
}

extend type ConnectionMetadata {
  timeSinceLastConnectionMillis: Int! @goField(forceResolver: true)
}

extend type Target {
  invocationTargetsTotalDurationMillis: Int! @goField(forceResolver: true)
}

"""
Maps a BEP file URI to a server-side download URL when one is available
(bytestream:// URIs route through bb-portal's /api/v1/servefile/...
endpoint; http(s):// URIs pass through; everything else returns null).
"""
type ArtifactFile {
  name: String!
  uri: String
  digest: String
  sizeBytes: Int
  downloadUrl: String @goField(forceResolver: true)
}

"""
A NamedSetOfFiles from the build's artifact graph: a set of files plus
references to nested sets. Output groups point at root sets and the
client walks childSetIds to enumerate every file. Mirrors the BEP
NamedSetOfFiles message.
"""
type ArtifactNamedSet {
  id: String!
  files: [ArtifactFile!]!
  childSetIds: [String!]!
}

"""
A target output group, referencing the root named sets whose transitive
closure makes up the group's files.
"""
type ArtifactOutputGroup {
  name: String!
  incomplete: Boolean!
  rootSetIds: [String!]!
}

"""
A completed target (optionally for a specific aspect) and its output
groups.
"""
type ArtifactTarget {
  label: String!
  aspect: String
  outputGroups: [ArtifactOutputGroup!]!
}

"""
The build's per-file artifact graph for an invocation. The server stores
this compressed at rest and decompresses and decodes it on demand; the
structured form here is returned directly so the client never decodes a
binary blob. Populated only when the save level is
basic_and_target_and_artifacts and a BuildFinished event arrived.
"""
type ArtifactGraph {
  namedSets: [ArtifactNamedSet!]!
  targets: [ArtifactTarget!]!
}

extend type BazelInvocation {
  artifactGraph: ArtifactGraph @goField(forceResolver: true)
}
