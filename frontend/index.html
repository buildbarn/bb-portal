<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- BB_PORTAL_CONFIGURATION_PLACEHOLDER -->
    <script>
      (function() {
        try {
          var key = 'prefers-dark';
          var isDark = localStorage.getItem(key) === 'true' || (!localStorage.getItem(key) && window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <div id="splash"><!-- VITE_SPLASH_PLACEHOLDER --></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
